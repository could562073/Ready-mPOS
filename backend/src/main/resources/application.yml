spring:
  application:
    name: ready-mpos

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/readympos}
    username: ${DB_USER:readympos}
    password: ${DB_PASS:readympos}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}
