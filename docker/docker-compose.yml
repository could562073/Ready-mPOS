services:
  # PostgreSQL 16 — 主資料庫，儲存每日帳目與同步狀態
  postgres:
    image: postgres:16-alpine
    container_name: readympos-postgres
    environment:
      POSTGRES_DB: readympos
      POSTGRES_USER: readympos
      POSTGRES_PASSWORD: readympos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readympos"]
      interval: 5s
      timeout: 5s
      retries: 10

  # pgAdmin — 資料庫管理介面，僅開發環境使用
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: readympos-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@readympos.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
